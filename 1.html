<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>METODO MAGIS - CAPITOLI ESPERIENZIALI</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --dark-bg: #07111A;
            --darker-bg: #050812;
            --accent-cyan: #3CF2FF;
            --accent-purple: #7A5CFF;
            --accent-orange: #ff9b2f;
            --accent-red: #FF6B6B;
            --accent-green: #4AFF6A;
            --glow-intense: 0 0 30px rgba(60, 242, 255, 0.6);
            --glow-soft: 0 0 15px rgba(60, 242, 255, 0.3);
            --text-primary: #E6F7FF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', 'Space Mono', monospace;
            background: var(--dark-bg);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            position: relative;
        }

        .bg-base {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at top, #3a1366, var(--darker-bg) 60%, #050108);
            z-index: -2;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(0deg, transparent 24%, rgba(60, 242, 255, 0.05) 25%, rgba(60, 242, 255, 0.05) 26%, transparent 27%, transparent 74%, rgba(60, 242, 255, 0.05) 75%, rgba(60, 242, 255, 0.05) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(60, 242, 255, 0.05) 25%, rgba(60, 242, 255, 0.05) 26%, transparent 27%, transparent 74%, rgba(60, 242, 255, 0.05) 75%, rgba(60, 242, 255, 0.05) 76%, transparent 77%, transparent);
            background-size: 60px 60px;
            z-index: -1;
            opacity: 0.3;
        }

        .scanlines {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 1;
        }

        .corner-bracket {
            position: fixed;
            width: 40px;
            height: 40px;
            border: 2px solid var(--accent-cyan);
            opacity: 0.6;
            pointer-events: none;
            z-index: 5;
        }

        .corner-bracket.top-left { top: 20px; left: 20px; border-right: none; border-bottom: none; }
        .corner-bracket.top-right { top: 20px; right: 20px; border-left: none; border-bottom: none; }
        .corner-bracket.bottom-left { bottom: 20px; left: 20px; border-right: none; border-top: none; }
        .corner-bracket.bottom-right { bottom: 20px; right: 20px; border-left: none; border-top: none; }

        .container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            z-index: 2;
            overflow-y: auto;
        }

        .screen {
            display: none;
            width: 100%;
            max-width: 1100px;
            animation: fadeIn 0.8s ease-out;
            opacity: 0;
            min-height: 100vh;
        }

        .screen.active {
            display: block;
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
        }

        @keyframes blink-warning {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        @keyframes float-up {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-100px); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* ===== TYPOGRAPHY ===== */
        .chapter-title {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 900;
            color: var(--accent-orange);
            letter-spacing: 3px;
            margin-bottom: 10px;
            animation: slideInLeft 0.8s ease-out;
            text-shadow: 0 0 20px rgba(255, 155, 47, 0.5);
        }

        .chapter-subtitle {
            font-size: clamp(1rem, 2.5vw, 1.8rem);
            color: var(--accent-cyan);
            letter-spacing: 2px;
            margin-bottom: 30px;
            animation: slideInRight 0.8s ease-out 0.1s backwards;
            font-weight: 700;
        }

        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
            margin: 30px 0;
            animation: slideInRight 0.6s ease-out;
        }

        .mission-label {
            font-size: 0.9rem;
            color: var(--accent-purple);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 40px;
            margin-bottom: 15px;
            font-family: 'Space Mono', monospace;
            animation: slideInLeft 0.6s ease-out;
        }

        .mission-title {
            font-size: clamp(1.2rem, 3vw, 2rem);
            color: var(--accent-cyan);
            font-weight: 900;
            margin-bottom: 20px;
            letter-spacing: 2px;
            animation: slideInRight 0.6s ease-out 0.1s backwards;
        }

        .timer-section {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            animation: slideInLeft 0.6s ease-out 0.2s backwards;
            font-size: 1.1rem;
            color: var(--accent-orange);
            font-weight: 700;
        }

        .timer-display {
            font-size: 1.8rem;
            color: var(--accent-orange);
            text-shadow: 0 0 15px rgba(255, 155, 47, 0.6);
            font-weight: 900;
            font-family: 'Space Mono', monospace;
            min-width: 60px;
        }

        .timer-display.warning {
            color: var(--accent-red);
            animation: blink-warning 0.5s infinite;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.8);
        }

        .mission-instruction {
            background: rgba(122, 92, 255, 0.08);
            border-left: 4px solid var(--accent-purple);
            padding: 25px;
            margin: 25px 0;
            border-radius: 6px;
            font-size: 1.1rem;
            line-height: 1.8;
            animation: slideInLeft 0.6s ease-out 0.2s backwards;
        }

        .instruction-text {
            color: var(--text-primary);
            margin-bottom: 15px;
        }

        .option-group {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .option-box {
            flex: 1;
            min-width: 150px;
            background: rgba(60, 242, 255, 0.05);
            border: 2px solid var(--accent-cyan);
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            font-size: 0.95rem;
            color: var(--accent-cyan);
            font-weight: 700;
            transition: all 0.3s ease;
            cursor: default;
        }

        .option-box:hover {
            box-shadow: 0 0 20px rgba(60, 242, 255, 0.4);
        }

        .system-message {
            background: rgba(60, 242, 255, 0.05);
            border: 1px solid rgba(60, 242, 255, 0.3);
            border-left: 3px solid var(--accent-cyan);
            padding: 20px;
            margin: 20px 0;
            border-radius: 4px;
            font-family: 'Space Mono', monospace;
            font-size: 0.95rem;
            line-height: 1.8;
            animation: slideInUp 0.6s ease-out 0.3s backwards;
        }

        .system-message .label {
            color: var(--accent-cyan);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            margin-bottom: 10px;
            display: block;
        }

        .system-message .text {
            color: rgba(230, 247, 255, 0.9);
            line-height: 1.6;
        }

        .result-box {
            background: rgba(74, 255, 106, 0.1);
            border: 2px solid var(--accent-green);
            padding: 20px;
            border-radius: 6px;
            margin: 20px 0;
            text-align: center;
            animation: slideInUp 0.6s ease-out;
        }

        .result-fragments {
            font-size: 1.8rem;
            color: var(--accent-green);
            font-weight: 900;
            text-shadow: 0 0 15px rgba(74, 255, 106, 0.5);
        }

        .glitch-text {
            color: var(--accent-red);
            animation: glitch 0.3s ease-out;
            text-shadow: 0 0 10px rgba(255, 107, 107, 0.8);
        }

        .discovery-box {
            background: rgba(122, 92, 255, 0.1);
            border: 2px solid var(--accent-purple);
            padding: 20px;
            margin: 15px 0;
            border-radius: 6px;
            animation: slideInUp 0.6s ease-out;
        }

        .discovery-label {
            color: var(--accent-purple);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .discovery-content {
            color: var(--text-primary);
            font-size: 1rem;
            line-height: 1.6;
        }

        /* ===== BUTTONS ===== */
        .btn-action {
            padding: 18px 50px;
            border: 3px solid var(--accent-cyan);
            background: rgba(60, 242, 255, 0.15);
            color: var(--accent-cyan);
            font-weight: 900;
            cursor: pointer;
            border-radius: 8px;
            font-family: 'Orbitron', monospace;
            font-size: 1.1rem;
            letter-spacing: 2px;
            margin-top: 25px;
            margin-bottom: 30px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: var(--glow-soft);
            text-transform: uppercase;
            animation: slideInUp 0.8s ease-out 0.4s backwards;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .btn-action::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--accent-cyan);
            transition: left 0.3s ease;
            z-index: -1;
        }

        .btn-action:hover {
            color: var(--dark-bg);
            box-shadow: var(--glow-intense);
            transform: translateY(-3px) scale(1.02);
            border-color: var(--accent-orange);
        }

        .btn-action:hover::before {
            left: 0;
        }

        .btn-next {
            padding: 14px 40px;
            border: 2px solid var(--accent-purple);
            background: rgba(122, 92, 255, 0.1);
            color: var(--accent-purple);
            font-weight: 700;
            cursor: pointer;
            border-radius: 6px;
            font-family: 'Orbitron', monospace;
            font-size: 0.95rem;
            letter-spacing: 1px;
            margin-top: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(122, 92, 255, 0.3);
            text-transform: uppercase;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .btn-next:hover {
            background: rgba(122, 92, 255, 0.2);
            box-shadow: 0 0 25px rgba(122, 92, 255, 0.6);
            transform: translateY(-2px);
        }

        .fragments-counter {
            position: fixed;
            top: 30px;
            right: 30px;
            font-size: 1.2rem;
            color: var(--accent-orange);
            font-weight: 900;
            text-shadow: 0 0 10px rgba(255, 155, 47, 0.5);
            z-index: 10;
        }

        .glitch-overlay {
            position: fixed;
            inset: 0;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            background: rgba(255, 107, 107, 0.05);
        }

        .glitch-overlay.active {
            animation: glitch 0.3s ease-out;
        }

        @media (max-width: 768px) {
            .container { padding: 15px; }
            .mission-instruction { padding: 20px; }
            .option-group { flex-direction: column; }
            .option-box { min-width: auto; }
            .fragments-counter { font-size: 1rem; top: 20px; right: 20px; }
        }

        .particle {
            position: fixed;
            pointer-events: none;
            animation: float-up 1s ease-out forwards;
        }
    </style>
</head>

                        fragments: 30,
                        result: "PROPRIETÀ MECCANICHE MAPPATE",
                        systemMessage: "Ogni materiale ha un limite di resistenza.\nOltre quel limite si deforma o si rompe.\nQuesto limite è una costante fisica.",
                        discovery: "DUREZZA → limite di resistenza alla deformazione"
                    }
                ],
                conclusion: {
                    discoveries: [
                        "PESO → indicatore di densità materiale",
                        "MATERIALI → hanno proprietà termiche diverse",
                        "DUREZZA → limite di resistenza alla deformazione"
                    ],
                    finalMessage: "La materia non è inerte.\nOgni oggetto è un'informazione codificata nei suoi atomi.\nImparando a leggerla, leggi l'universo."
                }
            }
        ];

        /* ===== STATO GIOCO ===== */
        const gameState = {
            currentChapter: 0,
            currentMission: 0,
            totalFragments: 0,
            discoveries: [],
            timer: null,
            time: 0,
            isInChainedMission: false
        };

        /* ===== CONTROLLER ===== */
        const gameController = {

            startChapter(chapterIndex) {
                gameState.currentChapter = chapterIndex;
                gameState.currentMission = 0;
                gameState.isInChainedMission = false;
                this.show("missionScreen");
                this.loadMission();
            },

            loadMission() {
                const chapter = chapters[gameState.currentChapter];
                const mission = chapter.missions[gameState.currentMission];

                let html = `
                    <div class="chapter-title">${chapter.title}</div>
                    <div class="chapter-subtitle">"${chapter.subtitle}"</div>
                    <div class="divider"></div>

                    <div class="mission-label">${mission.label}</div>
                    <div class="mission-title">${mission.title}</div>

                    <div class="timer-section">
                        <span>⏱</span>
                        <span class="timer-display" id="timerDisplay">${mission.timer}s</span>
                    </div>

                    <div class="mission-instruction">
                        <div class="instruction-text">📡 "${mission.instruction}"</div>
                        <div class="option-group">
                `;

                mission.options.forEach(option => {
                    html += `<div class="option-box">${option}</div>`;
                });

                html += `
                        </div>
                    </div>

                    <button class="btn-action" onclick="gameController.completePart1()">▶ FATTO</button>
                `;

                document.getElementById("missionContent").innerHTML = html;
                document.getElementById("fragmentsCounter").innerText = gameState.totalFragments + " ◆";
                
                this.startTimer(mission.timer);
            },

            startTimer(duration) {
                clearInterval(gameState.timer);
                gameState.time = duration;

                gameState.timer = setInterval(() => {
                    gameState.time--;
                    document.getElementById("timerDisplay").innerText = gameState.time + "s";

                    if (gameState.time <= 3) {
                        document.getElementById("timerDisplay").classList.add("warning");
                    }

                    if (gameState.time <= 0) {
                        clearInterval(gameState.timer);
                    }
                }, 1000);
            },

            completePart1() {
                const chapter = chapters[gameState.currentChapter];
                const mission = chapter.missions[gameState.currentMission];

                clearInterval(gameState.timer);
                gameState.totalFragments += mission.fragments;
                this.createParticles(mission.fragments);

                let html = `
                    <div class="chapter-title">${chapter.title}</div>
                    <div class="chapter-subtitle">"${chapter.subtitle}"</div>
                    <div class="divider"></div>

                    <div class="mission-label">${mission.label} • PARTE 1 COMPLETATA</div>
                    
                    <div class="result-box">
                        <div class="result-fragments">+${mission.fragments} FRAMMENTI</div>
                    </div>

                    <div class="system-message">
                        <span class="label">📡 SISTEMA:</span>
                        <span class="text">"${mission.systemMessage}"</span>
                    </div>
                `;

                if (mission.warning) {
                    html += `
                        <div class="system-message" style="border-left-color: var(--accent-red);">
                            <span class="label" style="color: var(--accent-red);">⚠️ AVVISO:</span>
                            <span class="text" style="color: rgba(255, 107, 107, 0.9);">"${mission.warning}"</span>
                        </div>
                    `;
                }

                if (mission.nextInstruction) {
                    html += `
                        <div style="margin-top: 40px; padding: 20px; background: rgba(60, 242, 255, 0.08); border-radius: 6px;">
                            <div style="font-size: 1.1rem; color: var(--accent-cyan); font-weight: 700; margin-bottom: 15px;">
                                ${mission.nextInstruction}
                            </div>
                            <div class="timer-section">
                                <span>⏱</span>
                                <span class="timer-display" id="timerDisplay">${mission.nextTimer}s</span>
                            </div>
                        </div>
                        <button class="btn-action" onclick="gameController.completePart2()">▶ FATTO</button>
                    `;
                } else {
                    if (mission.discovery) {
                        html += `
                            <div class="discovery-box">
                                <div class="discovery-label">📍 SCOPERTA:</div>
                                <div class="discovery-content">${mission.discovery}</div>
                            </div>
                        `;
                        if (!gameState.discoveries.includes(mission.discovery)) {
                            gameState.discoveries.push(mission.discovery);
                        }
                    }
                    html += `<button class="btn-next" onclick="gameController.nextMission()">CONTINUA ▶</button>`;
                }

                document.getElementById("missionContent").innerHTML = html;
                document.getElementById("fragmentsCounter").innerText = gameState.totalFragments + " ◆";

                if (mission.nextTimer) {
                    this.startTimer(mission.nextTimer);
                    gameState.isInChainedMission = true;
                }
            },

            completePart2() {
                const chapter = chapters[gameState.currentChapter];
                const mission = chapter.missions[gameState.currentMission];

                clearInterval(gameState.timer);
                gameState.totalFragments += mission.nextFragments;
                this.createParticles(mission.nextFragments);

                let html = `
                    <div class="chapter-title">${chapter.title}</div>
                    <div class="chapter-subtitle">"${chapter.subtitle}"</div>
                    <div class="divider"></div>

                    <div class="mission-label">${mission.label} • PARTE 2 COMPLETATA</div>
                    
                    <div class="result-box">
                        <div class="result-fragments">+${mission.nextFragments} FRAMMENTI</div>
                    </div>

                    <div class="system-message">
                        <span class="label">📡 SISTEMA:</span>
                        <span class="text">"${mission.nextSystemMessage}"</span>
                    </div>
                `;

                if (mission.discovery) {
                    html += `
                        <div class="discovery-box">
                            <div class="discovery-label">📍 SCOPERTA:</div>
                            <div class="discovery-content">${mission.discovery}</div>
                        </div>
                    `;
                    if (!gameState.discoveries.includes(mission.discovery)) {
                        gameState.discoveries.push(mission.discovery);
                    }
                }

                html += `<button class="btn-next" onclick="gameController.nextMission()">CONTINUA ▶</button>`;

                document.getElementById("missionContent").innerHTML = html;
                document.getElementById("fragmentsCounter").innerText = gameState.totalFragments + " ◆";
            },

            nextMission() {
                const chapter = chapters[gameState.currentChapter];

                gameState.currentMission++;
                gameState.isInChainedMission = false;

                if (gameState.currentMission >= chapter.missions.length) {
                    this.showChapterConclusion();
                } else {
                    this.loadMission();
                }
            },

            showChapterConclusion() {
                const chapter = chapters[gameState.currentChapter];

                let html = `
                    <div class="chapter-title">${chapter.title}</div>
                    <div class="chapter-subtitle">"${chapter.subtitle}"</div>
                    <div class="divider"></div>

                    <div style="text-align: center; margin: 50px 0;">
                        <div style="font-size: 2rem; color: var(--accent-cyan); font-weight: 900; margin-bottom: 20px;">✓ CAPITOLO COMPLETATO</div>
                    </div>

                    <div style="margin: 40px 0;">
                        <div style="font-size: 1.3rem; color: var(--accent-purple); font-weight: 700; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px;">SCOPERTE REALIZZATE:</div>
                `;

                chapter.conclusion.discoveries.forEach(discovery => {
                    html += `
                        <div class="discovery-box">
                            <div class="discovery-content">${discovery}</div>
                        </div>
                    `;
                });

                html += `
                    </div>

                    <div class="system-message" style="margin-top: 50px; background: rgba(74, 255, 106, 0.08); border-left-color: var(--accent-green);">
                        <span class="label" style="color: var(--accent-green);">📡 ANALISI COMPLETATA:</span>
                        <span class="text">"${chapter.conclusion.finalMessage}"</span>
                    </div>

                    <div style="text-align: center; margin-top: 50px;">
                        <div style="color: var(--accent-orange); font-weight: 700; font-size: 1.2rem; margin-bottom: 20px;">
                            FRAMMENTI TOTALI: ${gameState.totalFragments} ◆
                        </div>
                `;

                if (gameState.currentChapter < chapters.length - 1) {
                    html += `<button class="btn-next" onclick="gameController.startChapter(${gameState.currentChapter + 1})">CAPITOLO ${gameState.currentChapter + 2} ▶</button>`;
                } else {
                    html += `<button class="btn-next" onclick="gameController.showFinalScreen()">VISUALIZZA PERCORSO COMPLETO ▶</button>`;
                }

                html += `</div>`;

                document.getElementById("missionContent").innerHTML = html;
            },

            showFinalScreen() {
                let html = `
                    <div style="text-align: center; margin: 60px 0;">
                        <div class="chapter-title" style="font-size: 3.5rem; margin-bottom: 20px;">⭐ PERCORSO COMPLETATO ⭐</div>
                        <div class="chapter-subtitle">CONSAPEVOLEZZA SENSORIALE RAGGIUNTA</div>
                        <div class="divider"></div>

                        <div style="margin: 60px 0; font-size: 1.3rem; line-height: 2; color: rgba(230, 247, 255, 0.9);">
                            <p>Hai esplorato la realtà attraverso:</p>
                            <p style="color: var(--accent-orange); font-weight: 700; margin-top: 15px;">Colori • Geometria • Suono • Materia</p>
                            <p style="margin-top: 30px;">E hai accumulato:</p>
                            <p style="color: var(--accent-green); font-weight: 900; font-size: 2rem; margin: 20px 0;">${gameState.totalFragments} ◆ FRAMMENTI</p>
                            <p style="margin-top: 30px; color: var(--accent-cyan);">La percezione consapevole è il primo passo verso la vera conoscenza.</p>
                        </div>

                        <button class="btn-next" onclick="location.reload()" style="margin-top: 50px;">↻ RICOMINCIA PERCORSO</button>
                    </div>
                `;

                document.getElementById("missionContent").innerHTML = html;
            },

            show(screenId) {
                document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
                document.getElementById(screenId).classList.add("active");
            },

            createParticles(count) {
                const maxParticles = Math.min(count, 25);
                for (let i = 0; i < maxParticles; i++) {
                    setTimeout(() => {
                        const particle = document.createElement("div");
                        particle.className = "particle";
                        particle.innerText = "◆";
                        particle.style.left = Math.random() * window.innerWidth + "px";
                        particle.style.top = window.innerHeight - 100 + "px";
                        particle.style.color = Math.random() > 0.5 ? "#3CF2FF" : "#ff9b2f";
                        particle.style.fontSize = Math.random() * 10 + 14 + "px";
                        document.body.appendChild(particle);
                        setTimeout(() => particle.remove(), 1000);
                    }, i * 25);
                }
            }
        };

    </script>

</body>
</html>
